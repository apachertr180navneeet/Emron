            <main class="flex-1 p-8 bg-slate-50">
                <div class="space-y-6">
                    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                        <div class="p-6 border-b border-slate-100 bg-slate-50/50">
                            <h3 class="text-sm font-bold text-slate-800 flex items-center gap-2">
                                <svg class="w-5 h-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
                                Company Details
                            </h3>
                        </div>
                        <div class="p-6">
                            <form id="companyForm" onsubmit="saveCompany(event)">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div class="space-y-5">
                                        <div><label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Company Name <span class="text-rose-500">*</span></label><input type="text" id="companyName" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-medium text-slate-800 placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition shadow-sm" placeholder="Enter company name"></div>
                                        <div><label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Owner Name <span class="text-rose-500">*</span></label><input type="text" id="ownerName" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-medium text-slate-800 placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition shadow-sm" placeholder="Enter owner name"></div>
                                        <div><label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Mobile Number <span class="text-rose-500">*</span></label><input type="text" id="phone" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-medium text-slate-800 placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition shadow-sm" placeholder="Enter mobile number"></div>
                                        <div><label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Email <span class="text-rose-500">*</span></label><input type="email" id="email" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-medium text-slate-800 placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition shadow-sm" placeholder="Enter email address"></div>
                                        <div><label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">GST Number</label><input type="text" id="gst" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-medium text-slate-800 placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition shadow-sm" placeholder="Enter GST number"></div>
                                    </div>
                                    <div class="space-y-5">
                                        <div><label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Company</label><select id="companySelect" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-medium text-slate-800 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition shadow-sm bg-white" ><option>Loading...</option></select></div>
                                        <div><label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Address</label><textarea id="address" rows="2" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-medium text-slate-800 placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition shadow-sm" placeholder="Enter address"></textarea></div>
                                        <div><label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">City <span class="text-rose-500">*</span></label><input type="text" id="city" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-medium text-slate-800 placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition shadow-sm" placeholder="Enter city"></div>
                                        <div><label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">State</label><input type="text" id="state" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-medium text-slate-800 placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition shadow-sm" placeholder="Enter state"></div>
                                        <div><label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Pin Code</label><input type="text" id="pinCode" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-medium text-slate-800 placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition shadow-sm" placeholder="Enter pin code"></div>
                                        <div><label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Company Logo</label><input type="file" id="logo" accept="image/*" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-medium text-slate-500 file:mr-3 file:py-1.5 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition shadow-sm"></div>
                                    </div>
                                </div>

                                <hr class="my-6 border-slate-100">

                                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div><label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Username</label><input type="text" id="username" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-medium text-slate-800 placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition shadow-sm" placeholder="Username"></div>
                                    <div><label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Password</label><input type="password" id="password" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-medium text-slate-800 placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition shadow-sm" placeholder="Password"></div>
                                    <div><label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Status <span class="text-rose-500">*</span></label>
                                        <select id="status" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-medium text-slate-800 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition shadow-sm bg-white">
                                            <option value="Active">Active</option>
                                            <option value="Inactive">Inactive</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="mt-8 pt-6 border-t border-slate-100 flex items-center gap-3 justify-end">
                                    <a href="company.html" class="px-6 py-2.5 rounded-xl text-sm font-bold bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 transition shadow-sm">Cancel</a>
                                    <button type="submit" class="px-6 py-2.5 rounded-xl text-sm font-bold bg-indigo-600 hover:bg-indigo-700 text-white shadow-md shadow-indigo-600/10 transition">Save Company</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

<script>
    const STORAGE_KEY = 'enro_companies';
    const ACTIVE_COMPANY_KEY = 'enro_active_company';

    function getActiveCompany() {
        return parseInt(localStorage.getItem(ACTIVE_COMPANY_KEY)) || 1;
    }

    function switchCompany(id) {
        localStorage.setItem(ACTIVE_COMPANY_KEY, id);
        window.location.reload();
    }

    function renderCompanySelector() {
        const data = localStorage.getItem('enro_companies');
        const companies = data ? JSON.parse(data) : [];
        const sel = document.getElementById('companySelect');
        if (!sel) return;
        sel.innerHTML = '<option value="" disabled selected>Select Company</option>' +
            companies.map(c =>
                `<option value="${c.id}">${c.companyName}</option>`
            ).join('');
    }

    function getCompanies() {
        const data = localStorage.getItem(STORAGE_KEY);
        if (!data || data.includes('"Bush"') || data.includes('"DP"')) return [];
        return JSON.parse(data);
    }

    function saveCompanies(companies) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(companies));
    }

    document.addEventListener('DOMContentLoaded', renderCompanySelector);

    function saveCompany(e) {
        e.preventDefault();
        const companies = getCompanies();
        const maxId = companies.length > 0 ? Math.max(...companies.map(v => v.id)) : 0;
        const company = {
            id: maxId + 1,
            companyName: document.getElementById('companyName').value.trim(),
            ownerName: document.getElementById('ownerName').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            email: document.getElementById('email').value.trim(),
            gst: document.getElementById('gst').value.trim(),
            address: document.getElementById('address').value.trim(),
            city: document.getElementById('city').value.trim(),
            state: document.getElementById('state').value.trim(),
            pinCode: document.getElementById('pinCode').value.trim(),
            logo: document.getElementById('logo').files.length > 0 ? document.getElementById('logo').files[0].name : '',
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value.trim(),
            status: document.getElementById('status').value
        };
        companies.push(company);
        saveCompanies(companies);
        Swal.fire({ title: 'Company Added!', text: 'Company has been created successfully.', icon: 'success', timer: 2000, showConfirmButton: false }).then(() => {
            window.location.href = 'company.html';
        });
    }
</script>

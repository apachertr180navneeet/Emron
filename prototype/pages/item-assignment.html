    <script>
        const STORAGE_KEY = 'enro_items';

        function getActiveCompany() {
            return parseInt(localStorage.getItem('enro_active_company')) || 1;
        }

        function switchCompany(id) {
            localStorage.setItem('enro_active_company', id);
            window.location.reload();
        }

        function renderCompanySelector() {
            const activeId = getActiveCompany();
            const data = localStorage.getItem('enro_companies');
            const companies = data ? JSON.parse(data) : [];
            const sel = document.getElementById('companySelect');
            if (!sel) return;
            sel.innerHTML = companies.map(c =>
                `<option value="${c.id}" ${c.id === activeId ? 'selected' : ''}>${c.companyName}</option>`
            ).join('');
        }

        function getAssignKey() {
            return 'enro_assignments_' + getActiveCompany();
        }

        function getItems() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data).filter(v => v.companyId === getActiveCompany()) : [];
        }

        function getAssignments() {
            const data = localStorage.getItem(getAssignKey());
            return data ? JSON.parse(data) : {};
        }

        function saveAssignments(assignments) {
            localStorage.setItem(getAssignKey(), JSON.stringify(assignments));
        }

        let pendingAssignments = {};

        function renderMatrix() {
            const items = getItems();
            const finished = items.filter(v => v.type === 'Finished');
            const raw = items.filter(v => v.type === 'Raw');
            const saved = getAssignments();

            pendingAssignments = {};
            Object.keys(saved).forEach(k => {
                pendingAssignments[k] = {};
                Object.keys(saved[k]).forEach(rk => {
                    pendingAssignments[k][rk] = saved[k][rk];
                });
            });

            const container = document.getElementById('matrixContainer');
            if (!finished.length || !raw.length) {
                container.innerHTML = '<div class="p-8 text-center text-slate-400 text-sm">Both finished and raw items are required to show the matrix.</div>';
                return;
            }

            let html = '<table class="w-full text-left border-collapse"><thead><tr class="bg-slate-50 border-b border-slate-200">';
            html += '<th class="px-4 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider w-48">Finished \\ Raw</th>';
            raw.forEach(r => {
                html += `<th class="px-4 py-3 text-center text-xs font-bold text-slate-500 uppercase tracking-wider min-w-[130px]">
                <span class="text-amber-600">${r.shortCode}</span>
                <span class="text-[10px] text-slate-400 font-normal ml-1">${r.name}</span>
            </th>`;
            });
            html += '</tr></thead><tbody>';

            finished.forEach(f => {
                if (!pendingAssignments[f.id]) pendingAssignments[f.id] = {};
                html += `<tr class="border-b border-slate-100 hover:bg-slate-50/60 transition">`;
                html += `<td class="px-4 py-3 font-bold text-slate-900">
                <label class="inline-flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" onchange="toggleRowSelect(this, ${f.id})" class="w-4 h-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer">
                    <span>${f.name}</span>
                </label>
                <span class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded ml-1">${f.shortCode}</span>
            </td>`;
                raw.forEach(r => {
                    const assigned = pendingAssignments[f.id][r.id];
                    const checked = assigned ? 'checked' : '';
                    const val = assigned && assigned.value ? assigned.value : '';
                    html += `<td class="px-4 py-3 text-center">
                    <div class="flex flex-col items-center gap-1.5">
                        <input type="checkbox" class="assign-checkbox w-4 h-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer"
                            data-finished="${f.id}" data-raw="${r.id}" ${checked}
                            onchange="onCheckChange(this)">
                        <input type="text" class="assign-input w-full max-w-[90px] px-2 py-1 border border-slate-200 rounded-lg text-xs text-center focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 bg-white transition shadow-sm placeholder-slate-300"
                            placeholder="Qty" data-finished="${f.id}" data-raw="${r.id}" value="${val}"
                            oninput="onInputChange(this)">
                    </div>
                </td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function onCheckChange(el) {
            const finishedId = parseInt(el.dataset.finished);
            const rawId = parseInt(el.dataset.raw);
            if (!pendingAssignments[finishedId]) pendingAssignments[finishedId] = {};
            if (el.checked) {
                if (!pendingAssignments[finishedId][rawId]) {
                    pendingAssignments[finishedId][rawId] = { value: '' };
                }
            } else {
                delete pendingAssignments[finishedId][rawId];
                if (Object.keys(pendingAssignments[finishedId]).length === 0) delete pendingAssignments[finishedId];
            }
        }

        function onInputChange(el) {
            const finishedId = parseInt(el.dataset.finished);
            const rawId = parseInt(el.dataset.raw);
            if (!pendingAssignments[finishedId]) pendingAssignments[finishedId] = {};
            if (!pendingAssignments[finishedId][rawId]) pendingAssignments[finishedId][rawId] = { value: '' };
            pendingAssignments[finishedId][rawId].value = el.value;
        }

        function saveAllAssignments() {
            saveAssignments(pendingAssignments);
            Swal.fire({ title: 'Saved!', text: 'All assignments have been saved.', icon: 'success', timer: 1500, showConfirmButton: false, toast: true, position: 'top-end' });
        }

        function toggleRowSelect(el, finishedId) {
            const checkboxes = document.querySelectorAll(`.assign-checkbox[data-finished="${finishedId}"]`);
            checkboxes.forEach(cb => {
                cb.checked = el.checked;
                const rawId = parseInt(cb.dataset.raw);
                if (el.checked) {
                    if (!pendingAssignments[finishedId]) pendingAssignments[finishedId] = {};
                    if (!pendingAssignments[finishedId][rawId]) {
                        pendingAssignments[finishedId][rawId] = { value: '' };
                    }
                } else {
                    if (pendingAssignments[finishedId]) {
                        delete pendingAssignments[finishedId][rawId];
                        if (Object.keys(pendingAssignments[finishedId]).length === 0) delete pendingAssignments[finishedId];
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderCompanySelector();
            renderMatrix();
        });
    </script>
